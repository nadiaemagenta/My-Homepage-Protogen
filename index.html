<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Homepage</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff00cc 0%, #fff 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .business-card {
            width: 700px;
            height: 400px;
            background: url('https://images.pexels.com/photos/2101187/pexels-photo-2101187.jpeg?auto=compress&fit=crop&w=700&q=80') center/cover no-repeat;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(255,0,204,0.15);
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            padding: 48px;
            gap: 36px;
            position: relative;
            overflow: hidden;
        }
        .card-photo {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 0;
            border: none;
            box-shadow: none;
            z-index: 1;
        }
        .card-details {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 100%;
            z-index: 1;
        }
        .card-description {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 24px;
        }
        .card-actions {
            display: flex;
            gap: 18px;
        }
        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border: none;
            border-radius: 24px;
            background: linear-gradient(90deg, #ff00cc 0%, #fff 100%);
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(255,0,204,0.12);
            transition: background 0.3s, transform 0.3s;
        }
        .action-btn:hover {
            background: linear-gradient(90deg, #fff 0%, #ff00cc 100%);
            color: #ff00cc;
            transform: scale(1.05);
        }
        .card-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff00cc;
            margin-bottom: 8px;
        }
        .card-field {
            font-size: 1rem;
            color: #333;
            margin-bottom: 6px;
        }
        .favorites-section {
            margin-top: 32px;
        }
        .favorites-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ff00cc;
            margin-bottom: 12px;
        }
        .favorites-photos {
            display: flex;
            gap: 18px;
        }
        .favorite-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
        }
        .weather-widget {
            max-width: 300px;
            padding: 20px;
            border-radius: 12px;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: white;
            font-family: Arial, sans-serif;
        }
        .weather-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .weather-loading span {
            font-size: 2rem;
        }
        .weather-loading p {
            margin: 0;
            font-size: 1rem;
        }
        .weather-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .weather-error {
            color: #ffcccc;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="business-card">
        <img src="1734321584655.jpg" alt="Your Photo" class="card-photo">
        <div class="card-details">
            <div class="card-name">Nadia Magenta</div>
            <div class="card-description">Visual designer based in Chicago, IL</div>
            <div class="card-actions">
                <button class="action-btn">📧 Email Me</button>
                <button class="action-btn">📞 Call Me</button>
            </div>
            <div class="weather-widget-io-container">
                <a class="weatherwidget-io" href="https://forecast7.com/en/41d88n87d62/chicago/" data-label_1="CHICAGO" data-label_2="WEATHER" data-theme="original">CHICAGO WEATHER</a>
            </div>
            <div class="favorites-section">
                <div class="favorites-title">My Favorite Things</div>
                <div class="favorites-photos">
                    <img src="https://images.pexels.com/photos/1108099/pexels-photo-1108099.jpeg?auto=compress&fit=crop&w=200&q=80" alt="Husky" class="favorite-img">
                    <img src="https://images.pexels.com/photos/3912838/pexels-photo-3912838.jpeg?auto=compress&fit=crop&w=200&q=80" alt="Plane" class="favorite-img">
                    <img src="https://images.pexels.com/photos/70497/pexels-photo-70497.jpeg?auto=compress&fit=crop&w=200&q=80" alt="Chicago Hot Dog" class="favorite-img">
                </div>
            </div>
        </div>
    </div>
    <script>
        !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
    </script>
</body>
</html>
