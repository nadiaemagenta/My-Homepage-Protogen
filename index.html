<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Homepage</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff00cc 0%, #fff 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .business-card {
            width: 700px;
            height: 400px;
            background: url('https://images.pexels.com/photos/2101187/pexels-photo-2101187.jpeg?auto=compress&fit=crop&w=700&q=80') center/cover no-repeat;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(255,0,204,0.15);
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            padding: 48px;
            gap: 36px;
            position: relative;
            overflow: hidden;
        }
        .card-photo {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 0;
            border: none;
            box-shadow: none;
            z-index: 1;
        }
        .card-details {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 100%;
            z-index: 1;
        }
        .card-description {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 24px;
        }
        .card-actions {
            display: flex;
            gap: 18px;
        }
        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border: none;
            border-radius: 24px;
            background: linear-gradient(90deg, #ff00cc 0%, #fff 100%);
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(255,0,204,0.12);
            transition: background 0.3s, transform 0.3s;
        }
        .action-btn:hover {
            background: linear-gradient(90deg, #fff 0%, #ff00cc 100%);
            color: #ff00cc;
            transform: scale(1.05);
        }
        .card-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff00cc;
            margin-bottom: 8px;
        }
        .card-field {
            font-size: 1rem;
            color: #333;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="business-card">
        <img src="1734321584655.jpg" alt="Your Photo" class="card-photo">
        <div class="card-details">
            <div class="card-name">Nadia Magenta</div>
            <div class="card-description">Visual designer based in Chicago, IL</div>
            <div class="card-actions">
                <button class="action-btn">📧 Email Me</button>
                <button class="action-btn">📞 Call Me</button>
            </div>
        </div>
    </div>
</body>
</html>
