<!DOCTYPE html>
<html lang="en">
<head>
        <script>
            if (!window.location.pathname.endsWith('splash.html')) {
                window.location.href = 'splash.html';
            }
        </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Homepage</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #a8ff78 0%, #f9d423 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .container {
            background: rgba(255,255,255,0.7);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .profile-pic {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        h1 {
            color: #333;
            margin-bottom: 16px;
        }
        .contact-btn {
            margin-top: 24px;
            padding: 12px 32px;
            border: none;
            border-radius: 24px;
            background: linear-gradient(90deg, #ffb6c1 0%, #87cefa 100%);
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: background 0.3s, transform 0.3s;
            position: relative;
            overflow: hidden;
        }
        .contact-btn:hover {
            background: linear-gradient(270deg, #ff0000, #ff9900, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 400% 400%;
            animation: rainbow-gradient 2s linear infinite, throb 0.6s ease-in-out infinite alternate;
            transform: scale(1.08);
        }
        @keyframes rainbow-gradient {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        @keyframes throb {
            0% {transform: scale(1.08);}
            100% {transform: scale(0.95);}
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="1734321584655.jpg" alt="Your Photo" class="profile-pic">
        <h1>Hello World!</h1>
        <button class="contact-btn">Contact Me</button>
    </div>
</body>
</html>
