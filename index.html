<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Homepage</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff00cc 0%, #fff 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .business-card {
            width: 350px;
            height: 200px;
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(255,0,204,0.15);
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            padding: 24px;
            gap: 18px;
        }
        .card-photo {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ff00cc;
            box-shadow: 0 2px 8px rgba(255,0,204,0.12);
        }
        .card-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }
        .card-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff00cc;
            margin-bottom: 8px;
        }
        .card-field {
            font-size: 1rem;
            color: #333;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="business-card">
        <img src="1734321584655.jpg" alt="Your Photo" class="card-photo">
        <div class="card-details">
            <div class="card-name">Nadia Magenta</div>
            <div class="card-field">Phone: (your number)</div>
            <div class="card-field">Email: (your email)</div>
        </div>
    </div>
</body>
</html>
